<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בשבילך</title>
    <style>
        /* עיצוב כללי של הדף */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f0f0f; /* רקע כהה ויוקרתי */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* עיצוב הכפתור */
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(45deg, #ff416c, #ff4b2b); /* צבע רומנטי/חזק */
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .heart {
            color: #ff416c;
            font-size: 2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">♥</div>
        <h1>נזכרתי בזה וחשבתי עלייך...</h1>
        
        <a href="https://reuven.myqnapcloud.com:444/github/mc/mc.php" class="btn">
            כנסי לצפות בסרטון
        </a>
    </div>

</body>
</html>
