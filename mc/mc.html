<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בשבילך</title>
    <style>
        /* עיצוב הדף */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a; /* רקע שחור עמוק */
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
        }

        .heart {
            font-size: 50px;
            color: #e74c3c;
            margin-bottom: 20px;
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 22px;
            margin-bottom: 30px;
            font-weight: 400;
            line-height: 1.4;
        }

        /* עיצוב הכפתור */
        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="heart">❤️</span>
        <h1>נזכרתי בזה וחשבתי עלייך...<br>רציתי שתראי.</h1>
        
        <a href="https://reuven.myqnapcloud.com:444/github/mc/mc.php" class="btn">
            כנסי לצפות בסרטון
        </a>
    </div>

</body>
</html>
